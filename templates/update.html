{% extends 'base.html' %}

{% block title %}
Update Todo
{% endblock title %}

{% block body %}

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="glass-card p-4 text-white">

        <h3 class="text-center fw-bold mb-4">
          ✏️ Update Todo
        </h3>

        <form action="/update/{{todo.sno}}" method="POST">

          <div class="mb-3">
            <label class="form-label">Todo Title</label>
            <input type="text"
                   class="form-control rounded-pill"
                   name="title"
                   value="{{todo.title}}"
                   required>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control rounded-4"
                      name="desc"
                      rows="3"
                      required>{{todo.desc}}</textarea>
          </div>

          <div class="text-center">
            <button type="submit"
                    class="btn btn-warning fw-semibold btn-glow px-4">
              💾 Save Changes
            </button>

            <a href="/"
               class="btn btn-light fw-semibold btn-glow px-4 ms-2">
               ❌ Cancel
            </a>
          </div>

        </form>

      </div>

    </div>
  </div>
</div>

{% endblock body %}
