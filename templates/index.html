<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Todo-List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body {
  background: linear-gradient(-45deg, #6a11cb, #2575fc, #ff6a00, #ee0979);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
  min-height: 100vh;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.glass-card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  transition: 0.4s;
}

.glass-card:hover {
  transform: translateY(-5px);
}

.btn-glow {
  border-radius: 50px;
  transition: 0.3s;
}

.btn-glow:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px rgba(255,255,255,0.8);
}

.table-box {
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
}

.navbar {
  background: rgba(0,0,0,0.3) !important;
  backdrop-filter: blur(10px);
}
</style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4 text-white" href="/">
      <i class="bi bi-check2-square me-2"></i> MyTodo
    </a>
  </div>
</nav>

<!-- 🔥 FORM -->
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="glass-card p-4 text-white">

        <h3 class="text-center fw-bold mb-4">
          ✨ Todo-List
        </h3>

        <form action="/" method="POST">

          <div class="mb-3">
            <label class="form-label">Todo Title</label>
            <input type="text" class="form-control rounded-pill" name="title" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control rounded-4" name="desc" rows="3"></textarea>
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-light fw-semibold btn-glow px-4">
              ➕ Add Todo
            </button>
          </div>

        </form>

      </div>

    </div>
  </div>
</div>

<!-- 🔥 TABLE -->
<div class="container mt-5 mb-5">
  <div class="table-box p-4 shadow-lg">

    <h3 class="text-center fw-bold mb-4">
      📋 Your Todos
    </h3>

    <div class="table-responsive">
      <table class="table table-hover align-middle text-center">

        <thead class="table-dark">
          <tr>
            <th>SNo.</th>
            <th>Title</th>
            <th>Description</th>
            <th>Time</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>
          {% for todo in alltodo %}
          <tr>
            <td>{{loop.index}}</td>
            <td class="fw-semibold">{{todo.title}}</td>
            <td>{{todo.desc}}</td>
            <td>{{todo.date_created}}</td>
            <td>
              <a href="/Update/{{todo.sno}}" 
                 class="btn btn-success btn-sm btn-glow mx-1">
                 ✏️Update
              </a>
              <a href="/Delete/{{todo.sno}}" 
                 class="btn btn-danger btn-sm btn-glow mx-1">
                 🗑️Delete
              </a>
            </td>
          </tr>
          {% endfor %}
        </tbody>

      </table>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
